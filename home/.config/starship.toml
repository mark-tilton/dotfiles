"$schema" = 'https://starship.rs/config-schema.json'

# Flat prompt using the terminal's ANSI palette — Ghostty maps these colors to
# Kanagawa wave (dark) or lotus (light), so the prompt follows the OS theme.

format = """
$directory\
$git_branch\
$git_status\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
$docker_context\
$conda\
$pixi\
$time\
$line_break$character"""

[directory]
style = "bold blue"
format = "[$path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

[git_branch]
symbol = ""
style = "green"
format = '[$symbol $branch ]($style)'

[git_status]
style = "yellow"
format = '[($all_status$ahead_behind )]($style)'

[nodejs]
symbol = ""
style = "cyan"
format = '[$symbol( $version) ]($style)'

[c]
symbol = " "
style = "cyan"
format = '[$symbol( $version) ]($style)'

[cpp]
symbol = " "
style = "cyan"
format = '[$symbol( $version) ]($style)'

[rust]
symbol = ""
style = "cyan"
format = '[$symbol( $version) ]($style)'

[golang]
symbol = ""
style = "cyan"
format = '[$symbol( $version) ]($style)'

[php]
symbol = ""
style = "cyan"
format = '[$symbol( $version) ]($style)'

[java]
symbol = ""
style = "cyan"
format = '[$symbol( $version) ]($style)'

[kotlin]
symbol = ""
style = "cyan"
format = '[$symbol( $version) ]($style)'

[haskell]
symbol = ""
style = "cyan"
format = '[$symbol( $version) ]($style)'

[python]
symbol = ""
style = "cyan"
format = '[$symbol( $version) ]($style)'

[docker_context]
symbol = ""
style = "bright-black"
format = '[$symbol( $context) ]($style)'

[conda]
style = "bright-black"
format = '[$symbol( $environment) ]($style)'

[pixi]
style = "bright-black"
format = '[$symbol( $version)( $environment) ]($style)'

[time]
disabled = false
time_format = "%R"
style = "bright-black"
format = '[ $time]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[❯](bold green)'
error_symbol = '[❯](bold red)'
vimcmd_symbol = '[❮](bold green)'
vimcmd_replace_one_symbol = '[❮](bold purple)'
vimcmd_replace_symbol = '[❮](bold purple)'
vimcmd_visual_symbol = '[❮](bold yellow)'
