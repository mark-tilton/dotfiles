set -g prefix C-t
bind C-t send-prefix

# Pass truecolor through to the outer terminal
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

set-hook -g session-created 'run-shell "~/.config/tmux/new-session-layout.sh #{session_name}"'

bind-key -n C-o display-popup -E "tms"
bind-key -n C-p display-popup -E "tms switch"
bind-key -n C-m display-popup -E "tms windows"
bind-key -n C-n next-window

# Splits open in the current pane's directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Binds for killing panes and windows
bind w killp
bind q killw

# Allow the use of the mouse to resize panes
set -g mouse on

# Set the escape key delay to zero
set -sg escape-time 0

# Let the kitty graphics protocol pass through tmux (image.nvim / ueberzugpp)
set -gq allow-passthrough on
set -g visual-activity off

set -g status on

# Kanagawa status line via the terminal's ANSI palette — Ghostty maps these
# colors to wave (dark) or lotus (light), so tmux follows the OS theme.
set -g status-style "bg=default,fg=default"
set -g status-justify left
set -g status-left-length 40
set -g status-left "#[fg=blue,bold] #S  #[default]"
set -g status-right "#[fg=brightblack]#{b:pane_current_path} "
setw -g window-status-separator "  "
setw -g window-status-format "#[fg=brightblack]#I #W"
setw -g window-status-current-format "#[fg=yellow,bold]#I #W"
set -g message-style "bg=default,fg=yellow"
set -g mode-style "bg=blue,fg=black"
setw -g pane-border-style "fg=brightblack"
setw -g pane-active-border-style "fg=blue"

# Disable confirm before killing pane
bind-key x kill-pane

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
